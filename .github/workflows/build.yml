name: TVBoxOS Build Workflow
on:
#   push:
#     branches:
#       - main  # 可根据实际情况修改触发分支
#   pull_request:
#     branches:
#       - main
    workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install Android SDK and required tools
      run: |
        # 更新软件包列表
        sudo apt-get update
        # 安装 Android SDK 及相关工具（这里以安装基本的构建工具和 SDK 管理器为例，可按需调整）
        sudo apt-get install -y android-sdk build-essential
        # 设置 ANDROID_HOME 环境变量（根据实际安装路径来，这里假设是默认路径）
        echo "export ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
        # 将 Android SDK 工具目录添加到 PATH 环境变量中
        echo "export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

    - name: Install specific Android SDK platform and build tools
      run: |
        # 安装指定版本的 Android SDK 平台（这里以 30 为例，你可按需调整）
        sdkmanager "platforms;android-30"
        # 安装指定版本的构建工具（这里以 30.0.3 为例，你可按需调整）
        sdkmanager "build-tools;30.0.3"

    - name: Grant permissions for Gradle wrapper
      run: chmod +x gradlew

    - name: Build the app
      run: ./gradlew build -x test