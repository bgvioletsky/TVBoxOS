name: TVBoxOS Build Workflow
on:
#   push:
#     branches:
#       - main  # 可根据实际情况修改触发分支
#   pull_request:
#     branches:
#       - main
    workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        android-sdk-version: '30'  # 可根据项目需求调整 SDK 版本
        ndk-version: '21.4.7075529'  # 可根据项目需求调整 NDK 版本

    - name: Grant permissions for Gradle wrapper
      run: chmod +x gradlew

    - name: Build the app
      run: ./gradlew build -x test